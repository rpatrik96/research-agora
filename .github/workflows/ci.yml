name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run tests (excluding synthetic)
        run: pytest tests/ -v -m "not synthetic"

  validate-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate marketplace structure
        run: python scripts/validate-marketplace.py

  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate and validate registry
        run: python scripts/generate-registry.py

      - name: Run registry tests
        run: |
          pip install pytest
          pytest tests/test_registry.py -v

  synthetic-tests:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio anthropic playwright pyyaml
          playwright install chromium --with-deps

      - name: Generate site
        run: |
          pip install jinja2
          python scripts/generate-site.py

      - name: Run synthetic tests (mocked)
        env:
          SYNTHETIC_MOCK_LLM: "1"
        run: pytest tests/synthetic/ -v -m synthetic
